<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvilArchives Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #ffd700;
            --danger-color: #ff4444;
            --success-color: #44ff88;
            --glass-bg: rgba(15, 15, 15, 0.75);
            --glass-border: rgba(255, 255, 255, 0.12);
            --font-header: 'Cinzel', serif;
            --font-body: 'Lora', serif;
            --font-ui: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: var(--font-ui);
            min-height: 100vh;
        }

        /* --- BACKGROUND --- */
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .background-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: radial-gradient(ellipse at 20% 50%, rgba(25,25,55,0.9) 0%, #050505 70%);
        }

        .admin-container { display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .admin-sidebar {
            width: 260px;
            background: rgba(8, 8, 8, 0.88);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-right: 1px solid var(--glass-border);
            padding: 1.5rem;
            display: flex; flex-direction: column;
            position: fixed; height: 100vh;
            overflow-y: auto; z-index: 200;
            scrollbar-width: thin; scrollbar-color: var(--accent-color) transparent;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .admin-sidebar::-webkit-scrollbar { width: 4px; }
        .admin-sidebar::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

        .sidebar-logo {
            font-family: var(--font-header); font-size: 1.5rem; color: var(--accent-color);
            letter-spacing: 4px; margin-bottom: 0.3rem; text-align: center;
            text-shadow: 0 0 15px rgba(255,215,0,0.4), 0 0 30px rgba(255,215,0,0.15);
        }
        .sidebar-subtitle {
            font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 3px;
            text-align: center; margin-bottom: 1.5rem; padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-section { margin-bottom: 1.5rem; }
        .nav-section-title {
            font-size: 0.6rem; color: #444; text-transform: uppercase;
            letter-spacing: 3px; margin-bottom: 0.5rem; padding-left: 0.5rem;
        }

        .nav-item {
            display: flex; align-items: center; gap: 0.8rem;
            padding: 0.75rem 1rem; color: #666; cursor: pointer;
            border-radius: 8px; transition: all 0.25s ease;
            font-size: 0.875rem; position: relative; border-left: 3px solid transparent;
        }
        .nav-item:hover {
            background: rgba(255,215,0,0.06); color: #ddd;
            border-left-color: rgba(255,215,0,0.3); padding-left: 1.3rem;
        }
        .nav-item.active {
            background: rgba(255,215,0,0.1); color: var(--accent-color);
            border-left-color: var(--accent-color); padding-left: 1.3rem;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
        }
        .nav-item.active i { filter: drop-shadow(0 0 4px var(--accent-color)); }
        .nav-item i { width: 18px; text-align: center; font-size: 0.9rem; }

        .sidebar-footer { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--glass-border); }
        .user-info {
            display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem;
            background: rgba(255,255,255,0.03); border-radius: 8px;
            border: 1px solid var(--glass-border); margin-bottom: 0.5rem;
        }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #b8960a);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #000; font-size: 0.9rem;
            box-shadow: 0 0 12px rgba(255,215,0,0.3); flex-shrink: 0;
        }
        .user-name { font-size: 0.85rem; color: #fff; }
        .user-role { font-size: 0.68rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; }

        /* Hamburger toggle (mobile) */
        .sidebar-toggle {
            display: none; position: fixed; top: 1rem; left: 1rem; z-index: 300;
            width: 42px; height: 42px; background: rgba(10,10,10,0.9);
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 8px; color: var(--accent-color); font-size: 1.1rem;
            cursor: pointer; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .sidebar-toggle:hover { background: rgba(255,215,0,0.15); border-color: var(--accent-color); }
        .sidebar-backdrop {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.65); z-index: 150; backdrop-filter: blur(4px);
        }
        .sidebar-backdrop.active { display: block; }

        /* --- MAIN CONTENT --- */
        .admin-main { flex: 1; margin-left: 260px; padding: 2rem; min-height: 100vh; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center; gap: 1rem;
            margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--glass-border);
            position: relative;
        }
        .page-header > * { min-width: 0; }
        .page-header::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 80px; height: 1px;
            background: linear-gradient(to right, var(--accent-color), transparent);
        }
        .page-title { font-family: var(--font-header); font-size: 1.8rem; color: #fff; }
        .page-subtitle { color: #555; font-size: 0.82rem; margin-top: 0.3rem; letter-spacing: 1px; }

        /* --- BUTTONS --- */
        .btn {
            padding: 0.6rem 1.2rem; font-family: var(--font-ui); font-size: 0.85rem;
            border: none; border-radius: 6px; cursor: pointer; transition: all 0.25s;
            display: inline-flex; align-items: center; gap: 0.5rem; letter-spacing: 0.5px;
            max-width: 100%; min-width: 0; justify-content: center; text-align: center;
        }
        .btn i { flex: 0 0 auto; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent-color); color: #000; font-weight: 600; }
        .btn-primary:hover { box-shadow: 0 0 20px rgba(255,215,0,0.5), 0 4px 15px rgba(255,215,0,0.2); transform: translateY(-2px); }
        .btn-secondary { background: rgba(255,255,255,0.06); color: #ccc; border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.3); }
        .btn-danger { background: rgba(255,68,68,0.15); color: var(--danger-color); border: 1px solid rgba(255,68,68,0.3); }
        .btn-danger:hover { background: var(--danger-color); color: #fff; box-shadow: 0 0 15px rgba(255,68,68,0.3); }
        .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.75rem; }

        /* --- GLASS CARDS --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .glass-card:hover { border-color: rgba(255,255,255,0.2); box-shadow: 0 8px 40px rgba(0,0,0,0.4); }

        .card-header {
            display: flex; justify-content: space-between; align-items: center; gap: 1rem;
            margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--glass-border);
        }
        .card-header > * { min-width: 0; }
        .card-title { font-family: var(--font-header); font-size: 1.1rem; color: var(--accent-color); }

        .data-table { width: 100%; border-collapse: collapse; }

        .data-table th, .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .data-table th {
            color: #888;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .data-table tr:hover { background: rgba(255,255,255,0.02); }

        .data-table img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
        }

        .status-badge {
            padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.68rem;
            text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px;
        }
        .status-published { background: rgba(68,255,136,0.15); color: var(--success-color); border: 1px solid rgba(68,255,136,0.3); }
        .status-draft { background: rgba(255,215,0,0.12); color: var(--accent-color); border: 1px solid rgba(255,215,0,0.3); }
        .action-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; min-width: 0; }

        /* --- CMS REBUILD: writer cockpit --- */
        .pill-row { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; }
        .admin-pill { display:inline-flex; align-items:center; gap:.35rem; padding:.3rem .65rem; border:1px solid var(--glass-border); border-radius:999px; color:#aaa; background:rgba(255,255,255,.04); font-size:.72rem; white-space:nowrap; }
        .admin-pill.gold { color:var(--accent-color); border-color:rgba(255,215,0,.28); background:rgba(255,215,0,.08); }
        .admin-pill.danger { color:var(--danger-color); border-color:rgba(255,68,68,.28); background:rgba(255,68,68,.08); }
        .writer-page-header { margin-bottom:1rem; }
        .writer-controls { display:grid; grid-template-columns:minmax(220px, 1fr) auto; gap:1rem; align-items:end; padding:1rem 1.1rem; margin-bottom:1rem; background:linear-gradient(180deg, rgba(17,17,17,.9), rgba(7,7,7,.78)); box-shadow:inset 0 1px 0 rgba(255,255,255,.04); }
        .writer-controls .form-group { margin:0; }
        .writer-shell { display:grid; grid-template-columns:minmax(320px, 360px) minmax(0, 1fr); gap:1rem; align-items:start; position:relative; }
        .writer-shell.sidebar-collapsed { grid-template-columns:72px minmax(0, 1fr); }
        .writer-sidebar { padding:0; width:auto; min-width:0; transition:all 0.28s cubic-bezier(0.4, 0, 0.2, 1); position:sticky; top:1rem; height:calc(100vh - 3rem); overflow:hidden; display:flex; flex-direction:column; background:linear-gradient(180deg, rgba(14,14,14,.96), rgba(4,4,4,.92)); box-shadow:0 24px 60px rgba(0,0,0,.34); }
        .writer-list { overflow:auto; padding:.65rem; display:grid; gap:.58rem; }
        .writer-item { border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:.78rem .84rem; background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.018)); cursor:pointer; transition:border-color .18s ease, background .18s ease, transform .18s ease, box-shadow .18s ease; position:relative; overflow:hidden; box-shadow:inset 0 1px 0 rgba(255,255,255,.03); }
        .writer-item::before { content:''; position:absolute; inset:0 auto 0 0; width:4px; background:transparent; transition:.18s ease; }
        .writer-item:hover { transform:translateY(-1px); border-color:rgba(255,255,255,.16); background:linear-gradient(180deg, rgba(255,255,255,.065), rgba(255,255,255,.026)); box-shadow:0 14px 24px rgba(0,0,0,.16); }
        .writer-item.active { border-color:rgba(255,215,0,.42); background:linear-gradient(180deg, rgba(255,215,0,.14), rgba(255,255,255,.035)); box-shadow:0 18px 36px rgba(0,0,0,.24); }
        .writer-item.active::before { background:var(--accent-color); box-shadow:0 0 18px rgba(255,215,0,.8); }
        .writer-item-head { display:grid; grid-template-columns:auto minmax(0, 1fr) auto; gap:.72rem; align-items:start; }
        .writer-item-title-wrap { min-width:0; }
        .writer-item-title { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; font-weight:700; color:#f3f3f3; overflow:hidden; min-width:0; line-height:1.22; font-size:.94rem; }
        .writer-item-number { display:inline-flex; align-items:center; justify-content:center; min-width:46px; height:30px; padding:0 .55rem; border-radius:999px; border:1px solid rgba(255,215,0,.24); background:rgba(255,215,0,.08); color:var(--accent-color); font-size:.72rem; font-weight:800; letter-spacing:.5px; }
        .writer-item-submeta { display:flex; align-items:center; justify-content:space-between; gap:.75rem; margin-top:.58rem; color:#8f8f8f; font-size:.74rem; }
        .writer-word-meta { color:#8f8f8f; white-space:nowrap; }
        .writer-meta-right { display:flex; align-items:center; justify-content:flex-end; gap:.35rem; flex-wrap:wrap; min-width:0; }
        .writer-tier-pill, .writer-access-pill, .writer-flag-pill { display:inline-flex; align-items:center; gap:.32rem; min-width:0; padding:.18rem .55rem; border-radius:999px; font-size:.68rem; line-height:1.1; }
        .writer-tier-pill { border:1px solid rgba(255,215,0,.22); background:rgba(255,215,0,.08); color:var(--accent-color); }
        .writer-tier-pill .label { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:130px; }
        .writer-access-pill { border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.045); color:#b8b8b8; }
        .writer-flag-pill { border:1px solid rgba(255,68,68,.22); background:rgba(255,68,68,.08); color:#ff8f8f; }
        .writer-sidebar.collapsed { width:72px; min-width:72px; }
        .writer-sidebar.collapsed .sidebar-full-content { display:none; }
        .writer-sidebar.collapsed:hover { width:72px; min-width:72px; }
        .writer-sidebar.collapsed:hover .sidebar-full-content { display:none; }
        .writer-sidebar.collapsed .collapsed-handle { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; height:100%; gap:1rem; padding:1rem 0; color:#888; cursor:pointer; width:100%; background:linear-gradient(180deg, rgba(255,255,255,.035), transparent); }
        .writer-sidebar.collapsed:hover .collapsed-handle { display:flex; }
        .writer-sidebar .collapsed-handle { display:none; }
        .collapsed-count { display:inline-flex; align-items:center; justify-content:center; min-width:36px; height:36px; border-radius:999px; background:rgba(255,215,0,.12); color:var(--accent-color); font-size:.74rem; font-weight:800; border:1px solid rgba(255,215,0,.22); }
        .writer-editor-card { min-height:calc(100vh - 10rem); padding:0; overflow:hidden; background:linear-gradient(180deg, rgba(15,15,15,.97), rgba(4,4,4,.94)); box-shadow:0 28px 70px rgba(0,0,0,.36); }
        .writer-topbar { display:flex; align-items:center; justify-content:space-between; gap:1rem; padding:1rem 1.25rem; border-bottom:1px solid rgba(255,255,255,.08); background:linear-gradient(90deg, rgba(255,215,0,.1), rgba(255,255,255,.03) 45%, rgba(0,0,0,.24)); position:sticky; top:0; z-index:5; backdrop-filter:blur(18px); }
        .writer-kicker { color:#777; font-size:.72rem; text-transform:uppercase; letter-spacing:1.8px; margin-bottom:.15rem; }
        .writer-tabs { display:flex; gap:.35rem; flex-wrap:wrap; padding:.75rem 1.25rem; border-bottom:1px solid rgba(255,255,255,.08); background:rgba(0,0,0,.24); }
        .writer-tab { padding:.55rem .82rem; border:1px solid rgba(255,255,255,.09); border-radius:999px; background:rgba(255,255,255,.045); color:#999; cursor:pointer; font-family:var(--font-ui); font-size:.78rem; transition:.18s ease; }
        .writer-tab:hover { color:#fff; border-color:rgba(255,255,255,.2); background:rgba(255,255,255,.07); }
        .writer-tab.active { color:#050505; background:var(--accent-color); border-color:var(--accent-color); box-shadow:0 0 22px rgba(255,215,0,.22); font-weight:700; }
        .writer-panel { display:none; padding:1.15rem; }
        .writer-panel.active { display:block; }
        .writer-workspace { max-width:1180px; margin:0 auto; }
        .manuscript-sheet { border:1px solid rgba(255,255,255,.1); border-radius:18px; overflow:hidden; background:linear-gradient(180deg, rgba(9,9,9,.98), rgba(0,0,0,1)); box-shadow:0 28px 80px rgba(0,0,0,.48); }
        .manuscript-title-row { display:grid; grid-template-columns:84px minmax(0, 1fr); gap:1rem; align-items:end; padding:1.35rem clamp(1.2rem, 4vw, 3rem) 1rem; border-bottom:1px solid rgba(255,255,255,.1); background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)); }
        .chapter-order-inline label { display:block; color:#777; font-size:.62rem; text-transform:uppercase; letter-spacing:1.4px; margin-bottom:.35rem; }
        .chapter-order-input { width:100%; border:1px solid rgba(255,255,255,.12); border-radius:12px; background:rgba(0,0,0,.48); color:var(--accent-color); font-family:var(--font-ui); font-size:1rem; font-weight:800; padding:.7rem .65rem; outline:none; }
        .chapter-order-input:focus { border-color:rgba(255,215,0,.45); box-shadow:0 0 0 3px rgba(255,215,0,.08); }
        .manuscript-title { width:100%; border:0; background:transparent; color:#fff; font-family:var(--font-header); font-size:clamp(2rem, 4vw, 3.45rem); padding:0; outline:none; }
        .manuscript-title::placeholder { color:rgba(255,255,255,.28); }
        .editor-toolbar { display:flex; gap:.45rem; flex-wrap:wrap; padding:.7rem clamp(1rem, 3vw, 1.4rem); border-bottom:1px solid rgba(255,255,255,.08); background:rgba(0,0,0,.62); position:sticky; top:69px; z-index:4; backdrop-filter:blur(12px); }
        .editor-toolbar button { padding:.42rem .68rem; border-radius:8px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.055); color:#ddd; cursor:pointer; font-family:var(--font-ui); transition:.16s ease; }
        .editor-toolbar button:hover { color:#fff; border-color:rgba(255,215,0,.35); background:rgba(255,215,0,.08); }
        .chapter-canvas { min-height:66vh; padding:clamp(1.5rem, 4vw, 3.75rem); color:#f5efe7; font-family:var(--font-body); font-size:1.16rem; line-height:2.02; outline:none; overflow:auto; }
        .chapter-canvas:empty:before { content:'Start writing...'; color:#666; font-style:italic; }
        .chapter-canvas p { margin:0 0 1.05rem; }
        .chapter-canvas h2, .chapter-canvas h3 { color:var(--accent-color); font-family:var(--font-header); margin:1rem 0 .5rem; }
        .chapter-canvas blockquote { margin:1rem 0; padding:.8rem 1rem; border-left:3px solid var(--accent-color); background:rgba(255,215,0,.06); color:#ddd; }
        .chapter-canvas hr { border:0; text-align:center; margin:1.5rem 0; }
        .chapter-canvas hr:after { content:'* * *'; color:var(--accent-color); letter-spacing:.5rem; }
        .writer-meta-strip { display:flex; justify-content:space-between; gap:.75rem; padding:.85rem 1.15rem; border-top:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.025); }
        .matrix-grid { display:grid; gap:.55rem; }
        .matrix-row { display:grid; grid-template-columns:70px 1fr 170px 110px; gap:.75rem; align-items:center; padding:.7rem .85rem; border:1px solid var(--glass-border); border-radius:10px; background:rgba(255,255,255,.035); }
        .matrix-row.nsfw { border-color:rgba(255,68,68,.28); }
        .subnav-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:.9rem; }
        .subnav-card { cursor:pointer; border:1px solid var(--glass-border); border-radius:12px; padding:1rem; background:rgba(255,255,255,.035); transition:.2s; }
        .subnav-card:hover { border-color:rgba(255,215,0,.45); transform:translateY(-2px); }
        @media (max-width: 980px) { .writer-controls, .writer-shell, .writer-shell.sidebar-collapsed { grid-template-columns:1fr; } .writer-sidebar, .writer-sidebar.collapsed { position:static; height:auto; max-height:45vh; width:auto; min-width:0; } .writer-sidebar.collapsed .sidebar-full-content { display:flex; } .writer-sidebar.collapsed .collapsed-handle { display:none; } .writer-editor-card { min-height:0; } .matrix-row { grid-template-columns:1fr; } .editor-toolbar { top:0; } }

        /* --- FORMS --- */
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; color: #999; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.5px; }
        .form-input, .form-textarea, .form-select {
            width: 100%; padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.35); border: 1px solid var(--glass-border);
            border-radius: 8px; color: #fff; font-family: var(--font-ui); font-size: 0.95rem;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none; border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.08);
        }
        .form-select option { background: #111; }
        .form-textarea { min-height: 150px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-checkbox { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .form-checkbox input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent-color); }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 1000; display: none; justify-content: center; align-items: center; padding: 2rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: rgba(14,14,14,0.97);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 2px solid rgba(255,215,0,0.4);
            border-radius: 16px; width: 100%; max-width: 700px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            scrollbar-width: thin; scrollbar-color: var(--accent-color) transparent;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem; border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; background: rgba(14,14,14,0.97); z-index: 10;
        }
        .modal-title { font-family: var(--font-header); font-size: 1.25rem; color: var(--accent-color); text-shadow: 0 0 10px rgba(255,215,0,0.2); }
        .modal-close { background: none; border: none; color: #555; font-size: 1.5rem; cursor: pointer; transition: all 0.2s; line-height: 1; }
        .modal-close:hover { color: var(--danger-color); transform: rotate(90deg); }
        .modal-body { padding: 1.5rem; }
        .modal-footer {
            padding: 1.5rem; border-top: 1px solid var(--glass-border);
            display: flex; justify-content: flex-end; gap: 1rem;
            position: sticky; bottom: 0; background: rgba(14,14,14,0.97);
        }

        /* --- STATS GRID --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 1.5rem 1.5rem 1.2rem; text-align: center; position: relative; overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255,215,0,0.08); border-color: rgba(255,215,0,0.3); }
        .stat-card::before {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(to right, transparent, var(--accent-color), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .stat-card:hover::before { opacity: 1; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: var(--accent-color); line-height: 1; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .stat-label { color: #555; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 0.5rem; }
        .stat-icon { position: absolute; right: 1.2rem; top: 1.2rem; font-size: 1.5rem; color: rgba(255,215,0,0.08); }

        /* Quick-action cards */
        .quick-actions { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .quick-action-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 1.2rem; cursor: pointer; transition: all 0.25s;
            display: flex; flex-direction: column; align-items: center; gap: 0.7rem; text-align: center;
        }
        .quick-action-card:hover { background: rgba(255,215,0,0.07); border-color: rgba(255,215,0,0.4); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .quick-action-card i { font-size: 1.4rem; color: var(--accent-color); }
        .quick-action-card span { font-size: 0.8rem; color: #bbb; font-weight: 500; letter-spacing: 0.5px; }

        /* Empty states */
        .empty-state { text-align: center; padding: 3rem 2rem; color: #555; }
        .empty-state i { font-size: 2.5rem; color: rgba(255,215,0,0.2); display: block; margin-bottom: 1rem; }
        .empty-state p { margin-bottom: 1.5rem; font-size: 0.9rem; }

        /* --- LOGIN --- */
        .login-container { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .login-box {
            background: rgba(10,10,12,0.85);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 2px solid rgba(255,215,0,0.35);
            border-radius: 20px; padding: 3rem; width: 100%; max-width: 420px;
            text-align: center; box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }
        .login-logo {
            font-family: var(--font-header); font-size: 2.2rem; color: var(--accent-color);
            letter-spacing: 6px; margin-bottom: 0.3rem;
            text-shadow: 0 0 20px rgba(255,215,0,0.4), 0 0 40px rgba(255,215,0,0.15);
        }
        .login-subtitle { color: #555; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 2.5rem; }
        .login-box .form-group { text-align: left; }
        .login-error {
            background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.4);
            color: var(--danger-color); padding: 0.8rem 1rem; border-radius: 8px;
            margin-bottom: 1.2rem; font-size: 0.84rem; display: none;
        }

        /* --- TOAST --- */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: rgba(14,14,14,0.95);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 10px;
            padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.8rem;
            z-index: 2000; transform: translateX(120%); opacity: 0; transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); min-width: 260px;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { border-left: 3px solid var(--success-color); }
        .toast.success i { color: var(--success-color); }
        .toast.error { border-left: 3px solid var(--danger-color); }
        .toast.error i { color: var(--danger-color); }

        /* --- LOADING --- */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .loading-overlay.active { display: flex; }
        /* Arcane Spiral Spinner */
        .arcane-spiral-container { position: relative; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; }
        .arcane-ring-outer {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, rgba(255,215,0,0.1) 30%, rgba(255,215,0,0.9) 100%);
            mask-image: radial-gradient(transparent 55%, black 56%);
            -webkit-mask-image: radial-gradient(transparent 55%, black 56%);
            animation: spin 1.5s linear infinite;
        }
        .arcane-ring-inner {
            position: absolute; width: 65%; height: 65%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, rgba(255,255,255,0.1) 40%, rgba(255,215,0,0.7) 100%);
            mask-image: radial-gradient(transparent 50%, black 51%);
            -webkit-mask-image: radial-gradient(transparent 50%, black 51%);
            animation: spin-reverse 2s linear infinite;
        }
        .arcane-core {
            position: absolute; width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color), 0 0 30px #fff;
            animation: arcane-pulse 1.2s ease-in-out infinite alternate;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes spin-reverse { to { transform: rotate(-360deg); } }
        @keyframes arcane-pulse { 0% { transform: scale(0.7); opacity: 0.6; } 100% { transform: scale(1.3); opacity: 1; } }

        /* --- IMAGE GRID --- */
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
        .image-grid-item {
            position: relative; aspect-ratio: 1; border-radius: 8px;
            overflow: hidden; border: 1px solid var(--glass-border); transition: border-color 0.2s;
        }
        .image-grid-item:hover { border-color: var(--accent-color); }
        .image-grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .image-grid-item .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.2s;
        }
        .image-grid-item:hover .overlay { opacity: 1; }

        /* --- GALLERY WORKSPACE --- */
        .gallery-toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(0, 1fr) minmax(220px, 1fr);
            gap: 1rem;
            align-items: end;
        }
        .gallery-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .gallery-stat {
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background:
                radial-gradient(circle at top right, rgba(255,215,0,0.16), transparent 38%),
                linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
            padding: 1rem 1rem 0.9rem;
        }
        .gallery-stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            margin-bottom: 0.35rem;
        }
        .gallery-stat-label {
            color: #8f8f8f;
            font-size: 0.76rem;
            letter-spacing: 1.3px;
            text-transform: uppercase;
        }
        .gallery-stat-note {
            margin-top: 0.35rem;
            color: #686868;
            font-size: 0.75rem;
        }
        .gallery-view-shell {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 200px;
            gap: 1.25rem;
            align-items: start;
        }
        .gallery-view-main {
            min-width: 0;
        }
        .gallery-view-aside {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            position: sticky;
            top: 1rem;
        }
        .gallery-view-toggle {
            text-align: left;
            justify-content: flex-start;
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 12px;
        }
        .gallery-view-toggle strong {
            display: block;
            font-size: 0.84rem;
            color: inherit;
        }
        .gallery-view-toggle span {
            display: block;
            margin-top: 0.2rem;
            font-size: 0.72rem;
            color: inherit;
            opacity: 0.8;
            line-height: 1.35;
        }
        .gallery-view-toggle.is-active {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08));
            border-color: rgba(255,215,0,0.35);
            color: #fff;
            box-shadow: 0 10px 24px rgba(0,0,0,0.24);
        }
        .gallery-stage {
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
                rgba(8,8,8,0.5);
            overflow: hidden;
        }
        .gallery-stage-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem 1rem 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .gallery-stage-title {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            color: #fff;
            font-family: var(--font-header);
            font-size: 1.05rem;
        }
        .gallery-stage-title i { color: var(--accent-color); }
        .gallery-stage-subtitle {
            margin-top: 0.3rem;
            color: #787878;
            font-size: 0.78rem;
            line-height: 1.45;
        }
        .gallery-stage-body {
            padding: 1rem;
        }
        .gallery-sections {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 1.25rem;
            align-items: start;
        }
        .gallery-section {
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
                rgba(8,8,8,0.5);
            overflow: hidden;
        }
        .gallery-section.hidden-pool {
            border-color: rgba(255,170,0,0.18);
            box-shadow: inset 0 0 0 1px rgba(255,170,0,0.04);
        }
        .gallery-section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem 1rem 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .gallery-section-title {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            color: #fff;
            font-family: var(--font-header);
            font-size: 1.05rem;
        }
        .gallery-section-title i { color: var(--accent-color); }
        .gallery-section-subtitle {
            margin-top: 0.3rem;
            color: #787878;
            font-size: 0.78rem;
            line-height: 1.45;
        }
        .gallery-section-body {
            padding: 1rem;
        }
        .gallery-grid-advanced {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }
        .gallery-card {
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 100%;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
        }
        .gallery-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255,215,0,0.4);
            box-shadow: 0 16px 34px rgba(0,0,0,0.35);
        }
        .gallery-card-media {
            position: relative;
            aspect-ratio: 1;
            background: rgba(0,0,0,0.45);
        }
        .gallery-card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .gallery-card-badges {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            right: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.4rem;
            pointer-events: none;
        }
        .gallery-badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }
        .gallery-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.28rem 0.55rem;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.65);
            border: 1px solid rgba(255,255,255,0.12);
            color: #f3f3f3;
        }
        .gallery-badge.live {
            background: rgba(68,255,136,0.16);
            border-color: rgba(68,255,136,0.28);
            color: var(--success-color);
        }
        .gallery-badge.hidden {
            background: rgba(255,170,0,0.14);
            border-color: rgba(255,170,0,0.24);
            color: #ffcc6b;
        }
        .gallery-badge.nsfw {
            background: rgba(255,68,68,0.18);
            border-color: rgba(255,68,68,0.3);
            color: #ff9f9f;
        }
        .gallery-card-body {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding: 0.95rem;
            flex: 1;
        }
        .gallery-card-title {
            color: #fff;
            font-size: 0.98rem;
            font-weight: 600;
            line-height: 1.35;
        }
        .gallery-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            color: #7b7b7b;
            font-size: 0.74rem;
        }
        .gallery-card-character {
            color: var(--accent-color);
            font-weight: 600;
        }
        .gallery-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .gallery-card-tag {
            padding: 0.28rem 0.55rem;
            border-radius: 999px;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #c9c9c9;
        }
        .gallery-card-actions {
            display: flex;
            gap: 0.55rem;
            flex-wrap: wrap;
        }
        .gallery-card-actions .btn {
            flex: 1 1 110px;
            justify-content: center;
        }
        .gallery-empty {
            border: 1px dashed rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 2rem 1.25rem;
            text-align: center;
            color: #777;
            background: rgba(255,255,255,0.02);
        }
        .gallery-empty i {
            display: block;
            font-size: 1.6rem;
            color: rgba(255,215,0,0.22);
            margin-bottom: 0.75rem;
        }
        .gallery-visibility-note {
            margin-top: -0.5rem;
            margin-bottom: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            color: #a3a3a3;
            font-size: 0.8rem;
            line-height: 1.5;
        }

        /* --- TAG INPUT --- */
        .tag-input-wrapper { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.5rem; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; min-height: 45px; }
        .tag-chip { display: inline-flex; align-items: center; gap: 0.3rem; background: var(--accent-color); color: #000; padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.8rem; }
        .tag-chip button { background: none; border: none; color: #000; cursor: pointer; font-size: 0.9rem; }
        .tag-input { flex: 1; min-width: 100px; background: transparent; border: none; color: #fff; font-size: 0.9rem; outline: none; }

        /* --- SCROLLBARS --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.4); border-radius: 10px; }
        * { scrollbar-width: thin; scrollbar-color: rgba(255,215,0,0.4) rgba(0,0,0,0.2); }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .admin-sidebar { transform: translateX(-100%); z-index: 200; }
            .admin-sidebar.active { transform: translateX(0); }
            .admin-main { margin-left: 0; padding: 1rem; padding-top: 4.5rem; }
            .form-row { grid-template-columns: 1fr; }
            .sidebar-toggle { display: flex; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .quick-actions { grid-template-columns: repeat(2, 1fr); }
            .gallery-toolbar { grid-template-columns: 1fr; }
            .gallery-view-shell { grid-template-columns: 1fr; }
            .gallery-view-aside { position: static; }
            .gallery-sections { grid-template-columns: 1fr; }
        }

        @media (max-width: 640px) {
            .page-header,
            .card-header,
            .action-btns,
            .modal-footer {
                flex-wrap: wrap;
                align-items: flex-start;
            }
            .page-title { font-size: 1.45rem; overflow-wrap: anywhere; }
            .btn { white-space: normal; line-height: 1.25; }
            .quick-actions,
            .stats-grid { grid-template-columns: 1fr; }
            .data-table { min-width: 680px; }
            .glass-card,
            .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .modal-content { width: calc(100vw - 1.5rem); max-height: calc(100dvh - 1.5rem); }
            .modal-footer .btn,
            .card-header .btn { flex: 1 1 160px; }
        }

        /* --- DROPZONE --- */
        .upload-dropzone {
            border: 2px dashed var(--glass-border);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .upload-dropzone:hover, .upload-dropzone.dragover {
            border-color: var(--accent-color);
            background: rgba(255, 215, 0, 0.03);
        }
        .upload-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .upload-preview-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.4);
        }
        .upload-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-preview-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            line-height: 1;
            transition: background 0.2s;
        }
        .upload-preview-item .remove-btn:hover {
            background: var(--danger-color);
        }

        /* --- INTERACTIVE TAG INPUT --- */
        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            min-height: 45px;
            align-items: center;
            transition: border-color 0.25s ease;
        }
        .tag-input-container:focus-within {
            border-color: var(--accent-color);
        }
        .tag-input-container .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: var(--accent-color);
            color: #000;
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .tag-input-container .tag-chip .remove {
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .tag-input-container .tag-chip .remove:hover {
            opacity: 1;
        }
        .tag-input-container .tag-input {
            flex: 1;
            min-width: 120px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            padding: 0.25rem 0;
        }
        .tag-input-container .tag-raw-input {
            flex: 1;
            min-width: 120px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            padding: 0.25rem 0;
        }

        /* --- TOGGLE SWITCH --- */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);

        }
        .switch {
            position: relative;

    <!-- SITE CONFIG + SUPABASE SDK -->
    <script src="js/subscription/site-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==============================================
        // SUPABASE CLIENT
        // ==============================================
        const ADMIN_SITE_CONFIG = window.SUBSCRIPTION_SITE_CONFIG || {};
        const SUPABASE_URL = (ADMIN_SITE_CONFIG.supabase && ADMIN_SITE_CONFIG.supabase.url) || '';
        const SUPABASE_ANON_KEY = (ADMIN_SITE_CONFIG.supabase && ADMIN_SITE_CONFIG.supabase.anonKey) || '';
        const CONFIGURED_SUPABASE = SUPABASE_URL && SUPABASE_ANON_KEY && !/YOUR_PROJECT_REF|YOUR_SUPABASE|CHANGE_ME/i.test(SUPABASE_URL + ' ' + SUPABASE_ANON_KEY);
        if (!CONFIGURED_SUPABASE) {
            console.error('Admin setup required: set supabase.url and supabase.anonKey in js/subscription/site-config.js.');
        }
        const supabaseClient = CONFIGURED_SUPABASE ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        // ==============================================
        // STATE
        // ==============================================
        const _State = {
            user: null,
            profile: null,
            currentView: localStorage.getItem('ea-admin-last-view') || 'dashboard',
            stories: [],
            characters: [],
            selectedStoryId: localStorage.getItem('ea-admin-last-story-id') || null,
            selectedCharacterId: localStorage.getItem('ea-admin-last-character-id') || null,
            gallerySearch: '',
            galleryVisibilityFilter: 'published',
            accessTiers: [],
            accessKeys: [],
            entitlements: [],
            providerMappings: [],
            editingChapterId: localStorage.getItem('ea-admin-last-chapter-id') || null,
            writerPanel: localStorage.getItem('ea-admin-last-writer-panel') || 'write',
            writerSidebarCollapsed: localStorage.getItem('ea-admin-writer-sidebar-collapsed') === 'true',
            readerSearch: ''
        };

        const State = new Proxy(_State, {
            set(target, prop, value) {
                target[prop] = value;
                if (prop === 'currentView') {
                    if (value) localStorage.setItem('ea-admin-last-view', value);
                    else localStorage.removeItem('ea-admin-last-view');
                } else if (prop === 'selectedStoryId') {
                    if (value) localStorage.setItem('ea-admin-last-story-id', value);
                    else localStorage.removeItem('ea-admin-last-story-id');
                } else if (prop === 'selectedCharacterId') {
                    if (value) localStorage.setItem('ea-admin-last-character-id', value);
                    else localStorage.removeItem('ea-admin-last-character-id');
                } else if (prop === 'editingChapterId') {
                    if (value) localStorage.setItem('ea-admin-last-chapter-id', value);
                    else localStorage.removeItem('ea-admin-last-chapter-id');
                } else if (prop === 'writerPanel') {
                    if (value) localStorage.setItem('ea-admin-last-writer-panel', value);
                    else localStorage.removeItem('ea-admin-last-writer-panel');
                } else if (prop === 'writerSidebarCollapsed') {
                    localStorage.setItem('ea-admin-writer-sidebar-collapsed', value ? 'true' : 'false');
                }
                return true;
            },
            get(target, prop) {
                return target[prop];
            }
        });

        // ==============================================
        // UTILS
        // ==============================================
        const Utils = {
            escapeHtml: (unsafe) => {
                if (!unsafe) return '';
                return (unsafe+'')
                     .replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            },
            escapeAttr: (unsafe) => {
                if (!unsafe) return '';
                return (unsafe+'')
                     .replace(/&/g, "&amp;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            },
            formatRelativeDate: (dateString) => {
                if (!dateString) return 'Unknown date';
                const date = new Date(dateString);
                if (Number.isNaN(date.getTime())) return 'Unknown date';
                return date.toLocaleDateString(undefined, {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            },
            htmlToPlainText: (html) => {
                const div = document.createElement('div');
                div.innerHTML = html || '';
                div.querySelectorAll('br').forEach(el => el.replaceWith('\n'));
                div.querySelectorAll('p,div,h2,h3,h4,blockquote,li').forEach(el => {
                    el.appendChild(document.createTextNode('\n'));
                });
                div.querySelectorAll('hr').forEach(el => el.replaceWith('\n---\n'));
                return (div.textContent || div.innerText || '').trim();
            },
            markdownInlineToHtml: (text) => {
                let out = Utils.escapeHtml(text || '');
                out = out.replace(/`([^`]+)`/g, '$1');
                out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                out = out.replace(/__([^_]+)__/g, '<strong>$1</strong>');
                out = out.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
                out = out.replace(/(^|[^_])_([^_\n]+)_/g, '$1<em>$2</em>');
                return out;
            },
            markdownToChapterHtml: (markdown) => {
                const lines = (markdown || '').replace(/\r\n?/g, '\n').split('\n');
                const blocks = [];
                let paragraph = [];
                let list = null;
                const flushParagraph = () => {
                    if (!paragraph.length) return;
                    blocks.push(`<p>${paragraph.map(line => Utils.markdownInlineToHtml(line)).join('<br>')}</p>`);
                    paragraph = [];
                };
                const flushList = () => {
                    if (!list) return;
                    blocks.push(`<${list.type}>${list.items.map(item => `<li>${Utils.markdownInlineToHtml(item)}</li>`).join('')}</${list.type}>`);
                    list = null;
                };
                lines.forEach(rawLine => {
                    const line = rawLine.trimEnd();
                    const trimmed = line.trim();
                    if (!trimmed) { flushParagraph(); flushList(); return; }
                    if (/^(\*\s*){3,}$|^(-\s*){3,}$|^_{3,}$/.test(trimmed)) {
                        flushParagraph(); flushList(); blocks.push('<hr>'); return;
                    }
                    const heading = trimmed.match(/^(#{2,4})\s+(.+)$/);
                    if (heading) {
                        flushParagraph(); flushList();
                        blocks.push(`<h${heading[1].length}>${Utils.markdownInlineToHtml(heading[2])}</h${heading[1].length}>`);
                        return;
                    }
                    const quote = trimmed.match(/^>\s?(.+)$/);
                    if (quote) {
                        flushParagraph(); flushList();
                        blocks.push(`<blockquote>${Utils.markdownInlineToHtml(quote[1])}</blockquote>`);
                        return;
                    }
                    const unordered = trimmed.match(/^[-*+]\s+(.+)$/);
                    const ordered = trimmed.match(/^\d+[.)]\s+(.+)$/);
                    if (unordered || ordered) {
                        flushParagraph();
                        const type = unordered ? 'ul' : 'ol';
                        if (!list || list.type !== type) flushList();
                        if (!list) list = { type, items: [] };
                        list.items.push((unordered || ordered)[1]);
                        return;
                    }
                    flushList();
                    paragraph.push(line);
                });
                flushParagraph();
                flushList();
                return Utils.sanitizeChapterHtml(blocks.join(''));
            },
            sanitizeChapterHtml: (html) => {
                const template = document.createElement('template');
                template.innerHTML = html || '';
                const allowed = new Set(['P','DIV','BR','STRONG','B','EM','I','BLOCKQUOTE','H2','H3','H4','HR','UL','OL','LI']);
                const walk = (node) => {
                    [...node.childNodes].forEach(child => {
                        if (child.nodeType === Node.ELEMENT_NODE) {
                            if (!allowed.has(child.tagName)) {
                                const frag = document.createDocumentFragment();
                                while (child.firstChild) frag.appendChild(child.firstChild);
                                child.replaceWith(frag);
                                walk(node);
                                return;
                            }
                            [...child.attributes].forEach(attr => child.removeAttribute(attr.name));
                            if (child.tagName === 'B') child.outerHTML = `<strong>${child.innerHTML}</strong>`;
                            if (child.tagName === 'I') child.outerHTML = `<em>${child.innerHTML}</em>`;
                            if (child.tagName === 'DIV') {
                                const p = document.createElement('p');
                                p.innerHTML = child.innerHTML || '<br>';
                                child.replaceWith(p);
                                walk(p);
                                return;
                            }
                        } else if (child.nodeType === Node.COMMENT_NODE) {
                            child.remove();
                            return;
                        } else if (child.nodeType === Node.TEXT_NODE && child.textContent.includes('\n')) {
                            const frag = document.createDocumentFragment();
                            child.textContent.split(/\n{2,}/).forEach((part, index) => {
                                if (index) frag.appendChild(document.createElement('br'));
                                if (part) frag.appendChild(document.createTextNode(part));
                            });
                            child.replaceWith(frag);
                            return;
                        }
                        walk(child);
                    });
                };
                walk(template.content);
                let output = template.innerHTML.trim();
                if (output && !/<(p|h2|h3|h4|blockquote|ul|ol|hr|br)\b/i.test(output)) {
                    output = `<p>${output}</p>`;
                }
                return output;
            },
            normalizeEditorHtml: (html) => {
                const raw = html || '';
                const emptyish = raw
                    .replace(/&nbsp;/gi, ' ')
                    .replace(/\u00a0/g, ' ')
                    .replace(/<br\s*\/?>/gi, '')
                    .replace(/<\/?(p|div)[^>]*>/gi, '')
                    .trim();
                if (!emptyish) return '';
                const looksLikeHtml = /<\/?[a-z][\s\S]*>/i.test(raw);
                return looksLikeHtml ? Utils.sanitizeChapterHtml(raw) : Utils.markdownToChapterHtml(raw);
            },
            makePreviewFromHtml: (html, max = 340) => {
                const text = Utils.htmlToPlainText(html).replace(/\s+/g, ' ').trim();
                return text.length > max ? text.slice(0, max).replace(/\s+\S*$/, '') + '…' : text;
            },
            isGalleryImagePublished: (image) => image?.is_published !== false,
            isGalleryImageNsfw: (image) => Array.isArray(image?.image_tags) && image.image_tags.includes('NSFW'),
            normalizeAccessKey: (value) => (value || '').trim().toUpperCase().replace(/\s+/g, ''),
            generateAccessCode: () => {
                const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                const bytes = new Uint8Array(12);
                crypto.getRandomValues(bytes);
                const raw = Array.from(bytes, b => alphabet[b % alphabet.length]).join('');
                return raw.match(/.{1,4}/g).join('-');
            },
            sha256Hex: async (value) => {
                const bytes = new TextEncoder().encode(value);
                const hash = await crypto.subtle.digest('SHA-256', bytes);
                return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
            },
            getImageUploadPayload: async (file, options = {}) => {
                const originalExtension = (file.name.split('.').pop() || 'jpg').toLowerCase();
                const fallback = {
                    body: file,
                    extension: originalExtension === 'jpeg' ? 'jpg' : originalExtension,
                    contentType: file.type || undefined
                };
                const convertibleTypes = new Set(['image/png', 'image/jpeg', 'image/jpg']);
                if (options.convertToWebp === false || !convertibleTypes.has(file.type.toLowerCase())) {
                    return fallback;
                }

                const objectUrl = URL.createObjectURL(file);
                let image = null;
                try {
                    image = await new Promise((resolve, reject) => {
                        const candidate = new Image();
                        candidate.onload = () => resolve(candidate);
                        candidate.onerror = () => reject(new Error('The selected image could not be decoded.'));
                        candidate.src = objectUrl;
                    });

                    const maxDimension = Math.max(1, Number(options.maxDimension) || 2560);
                    const scale = Math.min(1, maxDimension / Math.max(image.naturalWidth, image.naturalHeight));
                    const width = Math.max(1, Math.round(image.naturalWidth * scale));
                    const height = Math.max(1, Math.round(image.naturalHeight * scale));
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const context = canvas.getContext('2d', { alpha: file.type === 'image/png' });
                    if (!context) return fallback;
                    context.imageSmoothingEnabled = true;
                    context.imageSmoothingQuality = 'high';
                    context.drawImage(image, 0, 0, width, height);

                    const blob = await new Promise(resolve => canvas.toBlob(
                        resolve,
                        'image/webp',
                        Math.min(1, Math.max(0.5, Number(options.quality) || 0.84))
                    ));
                    if (!blob || (scale === 1 && blob.size >= file.size)) return fallback;
                    return { body: blob, extension: 'webp', contentType: 'image/webp' };
                } catch (error) {
                    console.warn('Image optimization skipped; uploading the original file.', error);
                    return fallback;
                } finally {
                    URL.revokeObjectURL(objectUrl);
                }
            },
            uploadImage: async (file, bucketName, folderPath = '', options = {}) => {
                if (!file) return null;
                const payload = await Utils.getImageUploadPayload(file, options);
                const fileName = `${Math.random().toString(36).substring(2, 15)}_${Date.now()}.${payload.extension}`;
                const filePath = folderPath ? `${folderPath}/${fileName}` : fileName;
                const upsert = options.upsert === true;

                const { data, error } = await supabaseClient.storage
                    .from(bucketName)
                    .upload(filePath, payload.body, {
                        cacheControl: options.cacheControl || (upsert ? '3600' : '31536000'),
                        contentType: payload.contentType,
                        upsert
                    });

                if (error) {
                    throw new Error(`Upload failed: ${error.message}`);
                }

                const { data: publicData } = supabaseClient.storage
                    .from(bucketName)
                    .getPublicUrl(filePath);
                
                return publicData.publicUrl;
            }
        };

        // ==============================================
        // UI HELPERS
        // ==============================================
        const UI = {
            imageUploadField: (id, label, currentValue, bucketName, multiple = false) => {
                const listId = `${id}_preview_list`;
                const urlInputId = `${id}_url`;
                const fileInputId = `${id}_file`;
                return `
                    <div class="form-group">
                        <label class="form-label">${label}</label>
                        <div class="upload-dropzone" id="${id}_dropzone" onclick="document.getElementById('${fileInputId}').click()">
                            <i class="fas fa-cloud-upload-alt" style="font-size: 1.8rem; color: var(--accent-color);"></i>
                            <span style="font-size: 0.9rem; color: #ccc;">Drag & drop images here or <strong>browse</strong></span>
                            <input type="file" id="${fileInputId}" accept="image/*" style="display: none;" ${multiple ? 'multiple' : ''} onchange="UI.handleFileSelection(this, '${listId}', '${urlInputId}')">
                        </div>
                        <div style="margin-top: 0.5rem;">
                            <input type="text" class="form-input" id="${urlInputId}" value="${Utils.escapeAttr(currentValue || '')}" placeholder="Or paste image URL directly..." oninput="UI.handleUrlInput(this, '${listId}')">
                        </div>
                        <div class="upload-preview-container" id="${listId}">
                            ${currentValue ? `
                                <div class="upload-preview-item" data-url="${Utils.escapeAttr(currentValue)}">
                                    <img src="${Utils.escapeAttr(currentValue)}" alt="Preview" loading="lazy" decoding="async">
                                    <button type="button" class="remove-btn" onclick="UI.clearPreviews('${listId}', '${urlInputId}')">&times;</button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            },

            handleFileSelection: (input, listId, urlInputId) => {
                const previewContainer = document.getElementById(listId);
                previewContainer.querySelectorAll('img[data-object-url]').forEach(img => URL.revokeObjectURL(img.dataset.objectUrl));
                previewContainer.innerHTML = '';
                const urlInput = document.getElementById(urlInputId);
                if (urlInput) urlInput.value = ''; // Reset direct URL value as file selection has priority

                if (input.files && input.files.length > 0) {
                    Array.from(input.files).forEach(file => {
                        const objectUrl = URL.createObjectURL(file);
                        const item = document.createElement('div');
                        item.className = 'upload-preview-item';
                        item.innerHTML = `
                            <img src="${objectUrl}" data-object-url="${objectUrl}" alt="Local Preview" decoding="async">
                            <button type="button" class="remove-btn" onclick="UI.clearPreviews('${listId}', '${urlInputId}')">&times;</button>
                        `;
                        previewContainer.appendChild(item);
                    });
                }
            },

            handleUrlInput: (input, listId) => {
                const previewContainer = document.getElementById(listId);
                previewContainer.querySelectorAll('img[data-object-url]').forEach(img => URL.revokeObjectURL(img.dataset.objectUrl));
                previewContainer.innerHTML = '';
                
                const fileInput = document.getElementById(input.id.replace('_url', '_file'));
                if (fileInput) fileInput.value = ''; // Reset file input as URL has priority

                if (input.value.trim()) {
                    const item = document.createElement('div');
                    item.className = 'upload-preview-item';
                    item.innerHTML = `
