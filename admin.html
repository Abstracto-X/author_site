            initTagComponent: (elementId, initialTags = []) => {
                const rawInput = document.getElementById(elementId);
                if (!rawInput) return;

                // Hide the raw input text box visually but keep it for simple extraction
                rawInput.style.display = 'none';

                // Check if interactive container already exists to avoid duplication
                let container = rawInput.parentElement.querySelector('.tag-input-container');
                if (container) container.remove();

                // Create interactive tags layout container
                container = document.createElement('div');
                container.className = 'tag-input-container';

                // Track standard JS list arrays cleanly
                let tagsList = [...initialTags];

                // Create dynamic text entry box inside chips row
                const inputField = document.createElement('input');
                inputField.type = 'text';
                inputField.className = 'tag-input';
                inputField.placeholder = tagsList.length === 0 ? 'Type tag and press Enter/Comma...' : '';

                // Render existing chips
                const renderChips = () => {
                    // Clear all but keeps input box
                    const existingChips = container.querySelectorAll('.tag-chip');
                    existingChips.forEach(chip => chip.remove());

                    tagsList.forEach((tag, index) => {
                        const chip = document.createElement('span');
                        chip.className = 'tag-chip';
                        chip.innerHTML = `
                            ${Utils.escapeHtml(tag)}
                            <span class="remove" data-index="${index}">&times;</span>
                        `;
                        container.insertBefore(chip, inputField);
                    });

                    // Update original hidden input value for DB compatibility
                    rawInput.value = tagsList.join(', ');
                };

                container.appendChild(inputField);
                rawInput.parentNode.insertBefore(container, rawInput.nextSibling);

                // Handle typing flow events
                inputField.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ',') {
                        e.preventDefault();
                        const val = inputField.value.trim().replace(/,/g, '');
                        if (val && !tagsList.includes(val)) {
                            tagsList.push(val);
                            inputField.value = '';
                            renderChips();
                            inputField.placeholder = '';
                        }
                    } else if (e.key === 'Backspace' && !inputField.value && tagsList.length > 0) {
                        tagsList.pop();
                        renderChips();
                        if (tagsList.length === 0) {
                            inputField.placeholder = 'Type tag and press Enter/Comma...';
                        }
                    }
                });

                // Delegate clicking removes
                container.addEventListener('click', (e) => {
                    if (e.target.classList.contains('remove')) {
                        const idx = parseInt(e.target.getAttribute('data-index'));
                        tagsList.splice(idx, 1);
                        renderChips();
                        if (tagsList.length === 0) {
                            inputField.placeholder = 'Type tag and press Enter/Comma...';
                        }
                    } else {
                        inputField.focus();
                    }
                });

                renderChips();
            },

            initTagAutocomplete: async (containerId, initialTags = []) => {
                const container = document.getElementById(containerId);
                if (!container) return;

                let tags = [...initialTags];
                let selectedIndex = -1;
                let allTags = [];

                const render = () => {
                    container.dataset.tags = JSON.stringify(tags);
                    container.innerHTML = `
                        <div class="tag-input-wrapper-relative">
                            <div class="tag-input-container">
                                ${tags.map((tag, idx) => `
                                    <span class="tag-chip">${Utils.escapeHtml(tag)} 
                                        <i class="fas fa-times" onclick="window._removeAutoTag('${containerId}', ${idx})"></i>
                                    </span>
                                `).join('')}
                                <input type="text" class="tag-raw-input" placeholder="Type tag..." autocomplete="off">
                            </div>
                            <div class="tag-autocomplete-dropdown"></div>
                            <input type="hidden" id="${containerId}_value" value="${Utils.escapeAttr(tags.join(','))}">
                        </div>
                    `;

                    const input = container.querySelector('.tag-raw-input');
                    const dropdown = container.querySelector('.tag-autocomplete-dropdown');

                    input.addEventListener('input', () => {
                        const val = input.value.trim().toLowerCase();
                        if (!val) {
                            dropdown.style.display = 'none';
                            return;
                        }

                        // Filter out existing choices
                        const matches = allTags.filter(t => t.toLowerCase().includes(val) && !tags.includes(t));
                        selectedIndex = -1;

                        let dropdownHtml = '';
                        if (matches.length > 0) {
                            dropdownHtml = matches.map((match, idx) => `
                                <div class="tag-autocomplete-item" data-index="${idx}" data-tag="${Utils.escapeAttr(match)}">
                                    <span>${Utils.escapeHtml(match)}</span>
                                    <span class="badge">Existing Tag</span>
                                </div>
                            `).join('');
                        }

                        // Always offer choice to create a completely new tag
                        if (!tags.includes(input.value.trim())) {
                            const isExactMatch = matches.some(m => m.toLowerCase() === val);
                            if (!isExactMatch) {
                                dropdownHtml += `
                                    <div class="tag-autocomplete-item text-accent" data-index="${matches.length}" data-tag="${Utils.escapeAttr(input.value.trim())}">
                                        <span>+ Create "${Utils.escapeHtml(input.value.trim())}"</span>
                                    </div>
                                `;
                            }
                        }

                        if (dropdownHtml) {
                            dropdown.innerHTML = dropdownHtml;
                            dropdown.style.display = 'block';

                            dropdown.querySelectorAll('.tag-autocomplete-item').forEach(item => {
                                item.addEventListener('click', () => {
                                    addTag(item.getAttribute('data-tag'));
                                });
                            });
                        } else {
                            dropdown.style.display = 'none';
                        }
                    });

                    input.addEventListener('keydown', (e) => {
                        const items = dropdown.querySelectorAll('.tag-autocomplete-item');
                        if (dropdown.style.display === 'block' && items.length > 0) {
                            if (e.key === 'ArrowDown') {
                                e.preventDefault();
                                selectedIndex = (selectedIndex + 1) % items.length;
                                highlightItem(items);
                            } else if (e.key === 'ArrowUp') {
                                e.preventDefault();
                                selectedIndex = (selectedIndex - 1 + items.length) % items.length;
                                highlightItem(items);
                            } else if (e.key === 'Enter') {
                                e.preventDefault();
                                if (selectedIndex >= 0 && selectedIndex < items.length) {
                                    addTag(items[selectedIndex].getAttribute('data-tag'));
                                } else if (input.value.trim()) {
                                    addTag(input.value.trim());
                                }
                            } else if (e.key === 'Escape') {
                                dropdown.style.display = 'none';
                            }
                        } else if (e.key === 'Enter' || e.key === ',') {
                            e.preventDefault();
                            if (input.value.trim()) {
                                addTag(input.value.trim());
                            }
                        }
                    });

                    // Close dropdown when clicking outside
                    document.addEventListener('click', (e) => {
                        if (!container.contains(e.target)) {
                            dropdown.style.display = 'none';
                        }
                    });
                };

                const highlightItem = (items) => {
                    items.forEach(item => item.classList.remove('selected'));
                    if (selectedIndex >= 0 && selectedIndex < items.length) {
                        const target = items[selectedIndex];
                        target.classList.add('selected');
                        target.scrollIntoView({ block: 'nearest' });
                    }
                };

                const addTag = (tag) => {
                    const cleanTag = tag.replace(/,/g, '').trim();
                    if (cleanTag && !tags.includes(cleanTag)) {
                        tags.push(cleanTag);
                        render();
                        container.querySelector('.tag-raw-input').focus();
                    }
                };

                window._removeAutoTag = (targetId, idx) => {
                    tags.splice(idx, 1);
                    render();
                };

                render();

                // Fetch all unique tags currently in the database to build suggestions
                try {
                    const { data } = await supabaseClient.from('character_gallery_images').select('image_tags');
                    const tagSet = new Set();
                    if (data) {
                        data.forEach(row => {
                            if (row.image_tags) {
                                row.image_tags.forEach(t => {
                                    // Filter out R18 structural tags from autocomplete options
                                    if (t && t !== 'NSFW' && t !== 'R18') tagSet.add(t);
                                });
                            }
                        });
                    }
                    allTags = Array.from(tagSet);
                } catch (e) {
                    console.error('Error fetching autocomplete tags:', e);
                }
            },
            getTagValues: (containerId) => {
                const hiddenInput = document.getElementById(`${containerId}_value`);
                if (hiddenInput) {
                    return hiddenInput.value
                        .split(',')
                        .map(tag => tag.trim())
                        .filter(Boolean);
                }

                const container = document.getElementById(containerId);
                if (!container?.dataset?.tags) return [];

                try {
                    const parsed = JSON.parse(container.dataset.tags);
                    return Array.isArray(parsed)
                        ? parsed.map(tag => `${tag}`.trim()).filter(Boolean)

                } catch (err) {
                    console.error('Error reading tag values:', err);
                    return [];
                }
            },

                    if (error && error.code === 'PGRST116') {
                        throw new Error('No profile found. If you just signed up, refresh and try again. If the problem persists, contact the site owner.');

                const items = await DB.getRequestItems(reqId);
                
                // 1. Process all items and inject into the Live Activity Log

                    const actionName = item.action === 'ADD' ? `add_${entityType}` : item.action === 'UPDATE' ? `edit_${entityType}` : `delete_${entityType}`;

                    if (item.entity_type === 'NODE') {
                        if (item.action === 'ADD' || item.action === 'UPDATE') {
                            const payload = { id: data.id, map_id: data.map_id, name: data.name, x: data.x, y: data.y, region: data.region || '', sector: data.sector || '', color: data.color, created_by: data.created_by };

                            await supabaseClient.from('map_changelog').insert({ map_id: data.map_id, user_id: request.user_id, action: actionName, entity_type: 'node', entity_id: data.id, new_data: payload });

                            await supabaseClient.from('map_changelog').insert({ map_id: request.map_id, user_id: request.user_id, action: actionName, entity_type: 'node', entity_id: item.entity_id });
                        }
                    } else if (item.entity_type === 'EDGE') {
                        if (item.action === 'ADD' || item.action === 'UPDATE') {
                            const payload = { id: data.id, map_id: data.map_id, source_node_id: data.source_node_id, target_node_id: data.target_node_id, source_name: data.source_name, target_name: data.target_name, geometry: data.geometry, edge_type: data.edge_type, color: data.color, created_by: data.created_by };
                            await supabaseClient.from('map_edges').upsert(payload);
                            await supabaseClient.from('map_changelog').insert({ map_id: data.map_id, user_id: request.user_id, action: actionName, entity_type: 'edge', entity_id: data.id, new_data: payload });

                            await supabaseClient.from('map_edges').delete().eq('id', item.entity_id);
                            await supabaseClient.from('map_changelog').insert({ map_id: request.map_id, user_id: request.user_id, action: actionName, entity_type: 'edge', entity_id: item.entity_id });

                const record = { story_id: storyId, rules, enabled, updated_at: new Date().toISOString() };
                if (existing?.id) {

            recalculateStoryAccess: async (storyId) => {
                const [policy, tiers, chapters] = await Promise.all([DB.getStoryAccessPolicy(storyId).catch(() => null), DB.getAccessTiers().catch(() => []), DB.getChapters(storyId)]);
                if (!policy?.enabled) return [];
                const windows = Array.isArray(policy.rules?.windows) ? policy.rules.windows : [];
                const byId = Object.fromEntries(tiers.map(t => [t.id, t]));
                const ranked = [...windows].filter(w => w.tier_id && Number(w.count) > 0).sort((a,b) => (byId[b.tier_id]?.tier_rank || 0) - (byId[a.tier_id]?.tier_rank || 0));
                const published = chapters.filter(c => c.is_published).sort((a,b) => (Number(b.chapter_order)||0) - (Number(a.chapter_order)||0));
                const updates = [];
                let cursor = 0;
                for (const win of ranked) {
                    const count = Math.max(0, Number(win.count)||0);
                    published.slice(cursor, cursor + count).forEach(ch => { if (!ch.is_nsfw) updates.push({ id: ch.id, required_tier_id: win.tier_id }); });
                    cursor += count;
                }
                published.slice(cursor).forEach(ch => { if (!ch.is_nsfw) updates.push({ id: ch.id, required_tier_id: null }); });
                for (const update of updates) await supabaseClient.from('chapters').update({ required_tier_id: update.required_tier_id }).eq('id', update.id);
                return updates;
            },

            editorCommand: (cmd) => { document.execCommand(cmd, false, null); document.getElementById('f-content')?.focus(); },

            handleEditorPaste: (event) => {
                const editor = document.getElementById('f-content');

                const clipboard = event.clipboardData;
                if (!clipboard) return;
                const html = clipboard.getData('text/html');
                const text = clipboard.getData('text/plain');
                if (!html && !text) return;
                event.preventDefault();
                const payload = html ? Utils.sanitizeChapterHtml(html) : Utils.markdownToChapterHtml(text);

                editor.dispatchEvent(new Event('input', { bubbles: true }));

                    const tags = UI.getTagValues('interactive-tags-wrapper');

                    const isNsfwChecked = document.getElementById('f-nsfw').checked;
                    if (isNsfwChecked) {

                editor.addEventListener('input', updateCount); updateCount();
            }
        };

        Forms.showWriterPanel = (panel = 'write') => {
            State.writerPanel = panel;
            document.querySelectorAll('[data-writer-tab]').forEach(tab => tab.classList.toggle('active', tab.dataset.writerTab === panel));
            document.querySelectorAll('[data-writer-panel]').forEach(section => section.classList.toggle('active', section.dataset.writerPanel === panel));
        };

        Forms.saveInlineChapter = async (id, publishOverride = null) => {
            try {
                UI.showLoading();
                const orderValue = parseInt(document.getElementById('f-chapter_order').value) || 0;
                const chapters = await DB.getChapters(State.selectedStoryId);
                const conflict = chapters.find(c => c.chapter_order === orderValue && c.id !== (id || null));
                if (conflict) throw new Error(`Chapter Order ${orderValue} is already used by "${conflict.title}". Please choose a different order.`);
                const isNsfw = document.getElementById('f-is_nsfw')?.checked || false;
                const externalUrl = document.getElementById('f-external_url')?.value.trim() || null;
                if (isNsfw && !externalUrl) throw new Error('NSFW/external-only chapters need an external URL.');
                const publicReleaseValue = document.getElementById('f-public_release_at')?.value || '';
                const record = {
                    story_id: State.selectedStoryId,
                    title: document.getElementById('f-title').value.trim() || 'Untitled chapter',
                    content: Forms.normalizeEditorNow(),
                    chapter_order: orderValue,
                    is_published: publishOverride === null ? document.getElementById('f-is_published')?.value === 'true' : !!publishOverride,
                    required_tier_id: document.getElementById('f-required_tier_id')?.value || null,
                    public_release_at: publicReleaseValue ? new Date(publicReleaseValue).toISOString() : null,
                    preview_text: document.getElementById('f-preview_text')?.value || Utils.makePreviewFromHtml(document.getElementById('f-content').innerHTML),
                    is_nsfw: isNsfw,
                    external_url: externalUrl
                };
                const saved = await DB.saveChapter(id || null, record);
                localStorage.removeItem(`ea-chapter-draft:${id || 'new'}:${State.selectedStoryId}`);
                State.editingChapterId = saved.id;
                UI.showToast(record.is_published ? 'Chapter saved and rolling access recalculated.' : 'Chapter draft saved.');
                Views.render('chapters');
            } catch (err) { UI.showToast(err.message, 'error'); } finally { UI.hideLoading(); }
        };
        Forms.chapterForm = (id = null) => {
            State.editingChapterId = id || 'new';
            Views.render('chapters');
        };
        Forms.toggleWriterSidebar = (event) => {
            if (event) event.stopPropagation();
            State.writerSidebarCollapsed = !State.writerSidebarCollapsed;
            const sidebar = document.getElementById('writer-sidebar');
            const shell = document.getElementById('writer-shell');
            if (sidebar) {
                sidebar.classList.toggle('collapsed', State.writerSidebarCollapsed);
                // Update header chevron icon
                const headerIcon = sidebar.querySelector('.sidebar-toggle-btn i');
                if (headerIcon) {
                    headerIcon.className = State.writerSidebarCollapsed ? 'fas fa-chevron-right' : 'fas fa-chevron-left';
                }
                // Update handle chevron icon
                const handleIcon = sidebar.querySelector('.collapsed-handle i');
                if (handleIcon) {
                    handleIcon.className = State.writerSidebarCollapsed ? 'fas fa-chevron-right' : 'fas fa-chevron-left';
                }
            }
            if (shell) {
                shell.classList.toggle('sidebar-collapsed', State.writerSidebarCollapsed);
            }
        };

        Views.rollingAccess = async (container) => {
            const [stories, tiers, policies] = await Promise.all([DB.getStories(), DB.getAccessTiers().catch(() => []), DB.getStoryAccessPolicies().catch(() => [])]);
            State.selectedStoryId = State.selectedStoryId || stories[0]?.id || null;
            const storyId = State.selectedStoryId;
            const chapters = storyId ? await DB.getChapters(storyId) : [];
            const policy = policies.find(p => p.story_id === storyId) || { enabled:true, rules:{ windows:[] } };
            const windows = Array.isArray(policy.rules?.windows) ? policy.rules.windows : [];
            const tierLookup = Object.fromEntries(tiers.map(t => [t.id, t]));
            const rankedWindows = [...windows].sort((a,b)=>(tierLookup[b.tier_id]?.tier_rank||0)-(tierLookup[a.tier_id]?.tier_rank||0));
            const matrix = chapters.filter(c => c.is_published).sort((a,b)=>(Number(b.chapter_order)||0)-(Number(a.chapter_order)||0)).map((ch, index) => {
                let cursor = 0, tier = null;
                for (const win of rankedWindows) {
                    const count = Number(win.count)||0;
                    if (index >= cursor && index < cursor + count) { tier = tierLookup[win.tier_id]; break; }
                    cursor += count;
                }
                return { ch, tier };
            });
            container.innerHTML = `
                <div class="page-header"><div><h1 class="page-title">Rolling Access</h1><p class="page-subtitle">Per-story chapter windows: newest chapters for top tiers, older non-NSFW chapters become free.</p></div><button class="btn btn-primary" onclick="Forms.saveRollingPolicy()"><i class="fas fa-save"></i> Save & Recalculate</button></div>
                <div class="glass-card"><label class="form-label">Story</label><select class="form-select" id="rolling-story" onchange="State.selectedStoryId=this.value; Views.render('rollingAccess')">${stories.map(s=>`<option value="${s.id}" ${s.id===storyId?'selected':''}>${Utils.escapeHtml(s.title)}</option>`).join('')}</select></div>
                <div class="glass-card"><div class="card-header"><h3 class="card-title">Tier Windows</h3><label class="form-checkbox"><input id="rolling-enabled" type="checkbox" ${policy.enabled !== false ? 'checked' : ''}> Enabled</label></div>
                    <div class="form-grid">${tiers.map(t => `<div class="form-group"><label class="form-label">${Utils.escapeHtml(t.name)} latest chapters</label><input class="form-input rolling-window" data-tier-id="${t.id}" type="number" min="0" value="${windows.find(w=>w.tier_id===t.id)?.count || 0}"><small style="color:#666">Rank ${t.tier_rank}; higher ranks are applied first.</small></div>`).join('') || '<p style="color:#777">Create access tiers first.</p>'}</div>
                </div>
                <div class="glass-card"><div class="card-header"><h3 class="card-title">Live Matrix</h3><button class="btn btn-secondary btn-sm" onclick="Forms.recalculateRollingNow()"><i class="fas fa-rotate"></i> Recalculate now</button></div><div class="matrix-grid">${matrix.map((row, i)=>`<div class="matrix-row ${row.ch.is_nsfw?'nsfw':''}"><div>#${row.ch.chapter_order}</div><div><strong>${Utils.escapeHtml(row.ch.title)}</strong><div class="pill-row" style="margin-top:.35rem"><span class="admin-pill">Position ${i+1}</span>${row.ch.is_nsfw?'<span class="admin-pill danger">NSFW external-only</span>':''}</div></div><div>${row.ch.is_nsfw ? 'External locked' : row.tier ? Utils.escapeHtml(row.tier.name) : 'Free / public'}</div><div>${row.ch.word_count || 0} words</div></div>`).join('') || '<p style="color:#777">No published chapters for this story.</p>'}</div></div>`;
        };

        Views.readers = async (container) => {
            const [profiles, entitlements, connections, redemptions, audit] = await Promise.all([DB.getReaderProfiles(), DB.getEntitlements().catch(()=>[]), DB.getProviderConnections().catch(()=>[]), DB.getAccessRedemptions().catch(()=>[]), DB.getEntitlementAuditLog().catch(()=>[])]);
            const readers = profiles.filter(p => p.role !== 'admin');
            const query = (State.readerSearch || '').toLowerCase().trim();
            const filteredReaders = query ? readers.filter(p => [p.id, p.display_name, p.username, p.email].some(v => String(v || '').toLowerCase().includes(query))) : readers;
            const profileLabel = (id) => {
                const p = profiles.find(profile => profile.id === id);
                return p?.display_name || p?.username || id || '-';
            };
            container.innerHTML = `<div class="page-header"><div><h1 class="page-title">Readers / CRM</h1><p class="page-subtitle">Profiles, grants, provider links, redemptions, and access audit history.</p></div><button class="btn btn-primary" onclick="Forms.manualGrantForm()"><i class="fas fa-user-check"></i> Manual Grant</button></div>
            <div class="stats-grid"><div class="stat-card"><i class="fas fa-users stat-icon"></i><div class="stat-value">${readers.length}</div><div class="stat-label">Readers</div></div><div class="stat-card"><i class="fas fa-user-check stat-icon"></i><div class="stat-value">${entitlements.filter(e=>e.status==='active').length}</div><div class="stat-label">Active Grants</div></div><div class="stat-card"><i class="fas fa-plug stat-icon"></i><div class="stat-value">${connections.length}</div><div class="stat-label">Provider Links</div></div><div class="stat-card"><i class="fas fa-key stat-icon"></i><div class="stat-value">${redemptions.length}</div><div class="stat-label">Key Redemptions</div></div></div>
            <div class="glass-card"><div class="card-header"><h3 class="card-title">Reader Profile Search</h3></div><div class="form-row"><div class="form-group"><label class="form-label">Search by name, username, or UUID</label><input class="form-input" id="reader-search" value="${Utils.escapeAttr(State.readerSearch || '')}" placeholder="Reader name, username, or UUID"></div><div class="form-group" style="display:flex;align-items:flex-end;gap:.5rem"><button class="btn btn-primary" onclick="State.readerSearch=document.getElementById('reader-search').value; Views.render('readers')"><i class="fas fa-search"></i> Search</button><button class="btn btn-secondary" onclick="State.readerSearch=''; Views.render('readers')">Clear</button></div></div><table class="data-table"><thead><tr><th>Name</th><th>Username</th><th>User ID</th><th>Joined</th><th>Actions</th></tr></thead><tbody>${filteredReaders.map(p=>`<tr id="reader-${p.id}"><td><strong>${Utils.escapeHtml(p.display_name || p.id)}</strong></td><td>${Utils.escapeHtml(p.username || '-')}</td><td><code>${Utils.escapeHtml(p.id)}</code></td><td>${Utils.formatRelativeDate(p.created_at)}</td><td><button class="btn btn-secondary btn-sm" onclick="State.readerSearch='${p.id}'; Views.render('readers')"><i class="fas fa-filter"></i> Focus</button></td></tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:#666">No matching reader profiles.</td></tr>'}</tbody></table></div>
            <div class="glass-card"><div class="card-header"><h3 class="card-title">Entitlements</h3><button class="btn btn-primary btn-sm" onclick="Forms.manualGrantForm()"><i class="fas fa-user-check"></i> Manual Grant</button></div><table class="data-table"><thead><tr><th>Reader</th><th>Tier</th><th>Source</th><th>Status</th><th>Valid Until</th><th>Actions</th></tr></thead><tbody>${entitlements.filter(e => !query || String(e.user_id || '').toLowerCase().includes(query) || String(e.profiles?.display_name || '').toLowerCase().includes(query) || String(e.profiles?.username || '').toLowerCase().includes(query)).map(e=>`<tr><td><a href="#reader-${e.user_id}" onclick="State.readerSearch='${e.user_id}'; Views.render('readers')" style="color:var(--accent-color)">${Utils.escapeHtml(e.profiles?.display_name || e.profiles?.username || profileLabel(e.user_id))}</a></td><td>${Utils.escapeHtml(e.reader_access_tiers?.name || 'Unknown tier')}</td><td>${Utils.escapeHtml(e.provider || e.source || 'manual')}</td><td><span class="status-badge ${e.status === 'active' ? 'status-published' : 'status-draft'}">${Utils.escapeHtml(e.status || 'active')}</span></td><td>${Utils.formatRelativeDate(e.valid_until)}</td><td>${e.status === 'active' ? `<button class="btn btn-danger btn-sm" onclick="Forms.revokeEntitlement('${e.id}')"><i class="fas fa-user-slash"></i> Revoke</button>` : '-'}</td></tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:#666">No entitlements found.</td></tr>'}</tbody></table></div>
            <div class="glass-card"><div class="card-header"><h3 class="card-title">Provider Connections</h3></div><table class="data-table"><thead><tr><th>Reader</th><th>Provider</th><th>Account</th><th>Status</th><th>Synced</th></tr></thead><tbody>${connections.map(c=>`<tr><td><a href="#reader-${c.user_id}" onclick="State.readerSearch='${c.user_id}'; Views.render('readers')" style="color:var(--accent-color)">${Utils.escapeHtml(c.profiles?.display_name || profileLabel(c.user_id))}</a></td><td>${Utils.escapeHtml(c.provider)}</td><td>${Utils.escapeHtml(c.provider_account_label || c.provider_user_id || '-')}</td><td>${Utils.escapeHtml(c.status)}</td><td>${Utils.formatRelativeDate(c.last_synced_at || c.updated_at)}</td></tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:#666">No provider connections.</td></tr>'}</tbody></table></div>
            <div class="glass-card"><div class="card-header"><h3 class="card-title">Access Key Redemptions</h3></div><table class="data-table"><thead><tr><th>When</th><th>Reader</th><th>Key</th><th>Campaign</th><th>Entitlement</th></tr></thead><tbody>${redemptions.map(r=>`<tr><td>${Utils.formatRelativeDate(r.redeemed_at)}</td><td><a href="#reader-${r.user_id}" onclick="State.readerSearch='${r.user_id}'; Views.render('readers')" style="color:var(--accent-color)">${Utils.escapeHtml(profileLabel(r.user_id))}</a></td><td><code>${Utils.escapeHtml(r.access_keys?.key_prefix || r.key_id || '-')}</code></td><td>${Utils.escapeHtml(r.access_keys?.campaign || r.access_keys?.label || '-')}</td><td><code>${Utils.escapeHtml(r.entitlement_id || '-')}</code></td></tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:#666">No key redemptions.</td></tr>'}</tbody></table></div>
            <div class="glass-card"><div class="card-header"><h3 class="card-title">Entitlement Audit Log</h3></div><table class="data-table"><thead><tr><th>When</th><th>User</th><th>Action</th><th>Source</th><th>Details</th></tr></thead><tbody>${audit.map(a=>`<tr><td>${Utils.formatRelativeDate(a.created_at)}</td><td><a href="#reader-${a.user_id}" onclick="State.readerSearch='${a.user_id || ''}'; Views.render('readers')" style="color:var(--accent-color)">${Utils.escapeHtml(profileLabel(a.user_id))}</a></td><td>${Utils.escapeHtml(a.action)}</td><td>${Utils.escapeHtml(a.provider || a.source || '-')}</td><td><code>${Utils.escapeHtml(JSON.stringify(a.details || {}))}</code></td></tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:#666">No audit events.</td></tr>'}</tbody></table></div>`;
        };

        Views.community = async (container) => {
            const [comments, reactions, stories, profiles] = await Promise.all([DB.getCommunityComments().catch(()=>[]), DB.getReactionTotals().catch(()=>[]), DB.getStories().catch(()=>[]), DB.getReaderProfiles().catch(()=>[])]);
            const chapterLookup = {};
            for (const story of stories) {
                const chapters = await DB.getChapters(story.id).catch(() => []);
                chapters.forEach(ch => { chapterLookup[ch.id] = { ...ch, story }; });
            }
            const profileLabel = (id, meta = {}) => profiles.find(p => p.id === id)?.display_name || meta.display_name || meta.username || id || 'Reader';
            const totals = {};
            reactions.forEach(r => { const key = `${r.chapter_id}:${r.reaction}`; totals[key] = (totals[key] || 0) + 1; });
            container.innerHTML = `<div class="page-header"><div><h1 class="page-title">Community</h1><p class="page-subtitle">Reader notes moderation/read view and reaction totals by story/chapter.</p></div></div>
            <div class="glass-card"><div class="card-header"><h3 class="card-title">Recent Comments</h3></div><table class="data-table"><thead><tr><th>When</th><th>Reader</th><th>Chapter</th><th>Comment</th><th>Links</th></tr></thead><tbody>${comments.map(c=>{ const chapter=chapterLookup[c.target_id]; return `<tr><td>${Utils.formatRelativeDate(c.created_at)}</td><td><a href="#" onclick="State.readerSearch='${c.user_id || ''}'; Views.render('readers'); return false;" style="color:var(--accent-color)">${Utils.escapeHtml(profileLabel(c.user_id, c.metadata || {}))}</a></td><td>${Utils.escapeHtml(chapter?.story?.title || c.target_type || '-')}${chapter ? `<br><strong>${Utils.escapeHtml(chapter.title)}</strong>` : `<br><code>${Utils.escapeHtml(c.target_id || '')}</code>`}</td><td>${Utils.escapeHtml(c.content)}</td><td><div class="action-btns">${chapter ? `<a class="btn btn-secondary btn-sm" href="index.html#/read/${chapter.id}" target="_blank"><i class="fas fa-book-open"></i> Reader</a>` : ''}<button class="btn btn-secondary btn-sm" onclick="navigator.clipboard?.writeText('${c.id}')"><i class="fas fa-copy"></i> ID</button></div></td></tr>`; }).join('') || '<tr><td colspan="5" style="text-align:center;color:#666">No reader comments yet.</td></tr>'}</tbody></table></div>
            <div class="glass-card"><div class="card-header"><h3 class="card-title">Reaction Totals</h3></div><table class="data-table"><thead><tr><th>Story</th><th>Chapter</th><th>Reaction</th><th>Total</th><th>Link</th></tr></thead><tbody>${Object.entries(totals).map(([key,total])=>{ const [chapterId,reaction]=key.split(':'); const row=reactions.find(r=>r.chapter_id===chapterId); const chapter=chapterLookup[chapterId]; return `<tr><td>${Utils.escapeHtml(chapter?.story?.title || '-')}</td><td>${Utils.escapeHtml(row?.chapters?.title || chapter?.title || chapterId)}</td><td>${Utils.escapeHtml(reaction)}</td><td>${total}</td><td><a class="btn btn-secondary btn-sm" href="index.html#/read/${chapterId}" target="_blank"><i class="fas fa-book-open"></i> Reader</a></td></tr>`; }).join('') || '<tr><td colspan="5" style="text-align:center;color:#666">No reactions yet.</td></tr>'}</tbody></table></div>`;
        };

        Views.storyExtras = async (container) => {
            const cards = [['characters','users','Characters and cast roster'],['gallery','images','Character/gallery images'],['lore','scroll','Lore encyclopedia'],['maps','map','Maps'],['timeline','stream','Timeline'],['wallpapers','paint-brush','Wallpapers'],['mapRequests','inbox','Map request queue']];
            container.innerHTML = `<div class="page-header"><div><h1 class="page-title">Story Extras</h1><p class="page-subtitle">Secondary world-building tools moved out of the main cockpit.</p></div></div><div class="subnav-grid">${cards.map(([view,icon,label])=>`<div class="subnav-card" onclick="Views.render('${view}')"><i class="fas fa-${icon}" style="color:var(--accent-color);font-size:1.4rem;margin-bottom:.75rem"></i><h3>${label}</h3><p style="color:#777;margin-top:.35rem;font-size:.82rem">Open editor</p></div>`).join('')}</div>`;
        };

        Forms.saveRollingPolicy = async () => {
            try {
                UI.showLoading();
                const storyId = document.getElementById('rolling-story')?.value || State.selectedStoryId;
                const windows = [...document.querySelectorAll('.rolling-window')].map(input => ({ tier_id: input.dataset.tierId, count: Number(input.value)||0 })).filter(w => w.count > 0);
                await DB.saveStoryAccessPolicy(storyId, { windows }, document.getElementById('rolling-enabled')?.checked !== false);
                await DB.recalculateStoryAccess(storyId);
                UI.showToast('Rolling access policy saved and applied.');
                Views.render('rollingAccess');
            } catch (err) { UI.showToast(err.message, 'error'); } finally { UI.hideLoading(); }
        };
        Forms.recalculateRollingNow = async () => {
            try { UI.showLoading(); await DB.recalculateStoryAccess(State.selectedStoryId); UI.showToast('Rolling access recalculated.'); Views.render('rollingAccess'); }
            catch (err) { UI.showToast(err.message, 'error'); } finally { UI.hideLoading(); }
        };

        // ==============================================
        // INITIALIZATION
        // ==============================================
        document.addEventListener('DOMContentLoaded', () => {
            // Login form handler
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                await Auth.login(email, password);
            });

            // Nav click handlers
            document.querySelectorAll('.nav-item[data-view]').forEach(item => {
                item.addEventListener('click', () => {
                    Views.render(item.dataset.view);
                    // Close sidebar on mobile after nav
                    if (window.innerWidth <= 900) closeSidebar();
                });
            });

            // Mobile sidebar toggle
            const toggle = document.getElementById('sidebar-toggle');
            const sidebar = document.getElementById('admin-sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');

            function openSidebar() {
                sidebar.classList.add('active');
                backdrop.classList.add('active');
                toggle.querySelector('i').className = 'fas fa-times';
            }
            function closeSidebar() {
                sidebar.classList.remove('active');
                backdrop.classList.remove('active');
                toggle.querySelector('i').className = 'fas fa-bars';
            }
            window.closeSidebar = closeSidebar;

            if (toggle) toggle.addEventListener('click', () => {
                sidebar.classList.contains('active') ? closeSidebar() : openSidebar();
            });
            if (backdrop) backdrop.addEventListener('click', closeSidebar);
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

            // Initialize auth
            Auth.init();
            
            // Apply admin wallpaper
            UI.applyAdminWallpaper();

            // Initialize floating particles
            Particles.init();
        });

        // ==============================================
        // PARTICLES ENGINE
        // ==============================================
        const Particles = {
            init: () => {
                const canvas = document.getElementById('particle-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let width, height, particles = [];
                const resize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize); resize();
                class Particle {
                    constructor() { this.reset(); this.y = Math.random() * height; }
                    reset() { this.x = Math.random() * width; this.y = height + 10; this.size = Math.random() * 1.5 + 0.4; this.speedY = Math.random() * 0.4 + 0.1; this.opacity = Math.random() * 0.4 + 0.05; }
                    update() { this.y -= this.speedY; if (this.y < -10) this.reset(); }
                    draw() { ctx.fillStyle = `rgba(255,215,0,${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
                }
                for (let i = 0; i < 25; i++) particles.push(new Particle());
                (function animate() { ctx.clearRect(0, 0, width, height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); })();
            }
        };
    </script>
